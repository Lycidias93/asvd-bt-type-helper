name: Telegram release announcement

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Send compact Telegram release post
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_NAME: ${{ github.event.release.name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_BODY: ${{ github.event.release.body }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          set -euo pipefail

          python3 <<'PY' > /tmp/telegram-message.html
          import datetime as dt
          import html
          import json
          import os
          import re
          import urllib.parse
          import urllib.request

          api = "https://api.github.com"
          token = os.environ.get("GITHUB_TOKEN", "")
          repo = os.environ["REPO"]
          tag = os.environ["TAG_NAME"]
          release_id = os.environ.get("RELEASE_ID", "")
          name = (os.environ.get("RELEASE_NAME") or tag).strip()
          url = os.environ["RELEASE_URL"]
          prerelease = os.environ.get("IS_PRERELEASE") == "true"
          body = (os.environ.get("RELEASE_BODY") or "").strip()
          published_at = os.environ.get("PUBLISHED_AT", "")

          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "telegram-release-announcement",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          denied_section_words = {
              "install", "installation", "download", "downloads", "expected", "output",
              "verify", "verification", "paths", "files", "assets", "checksums",
              "sha", "sha256", "notes", "usage", "how to", "test", "tests",
          }
          allowed_sections = {
              "added", "add", "features", "feature", "new",
              "changed", "change", "improved", "improvements", "updated", "update",
              "fixed", "fix", "fixes", "bug fixes", "bugfixes",
              "removed", "remove", "security", "changelog", "changes", "summary",
          }
          denied_line_words = re.compile(
              r"(install|download|sha256|checksum|expected|output|usage|command|path|artifact|asset|log|verify|run|tail|result:|```|</?details|summary)",
              re.I,
          )

          def parse_time(value):
              if not value:
                  return None
              try:
                  return dt.datetime.fromisoformat(value.replace("Z", "+00:00"))
              except ValueError:
                  return None

          def gh_json(path):
              req = urllib.request.Request(api + path, headers=headers)
              with urllib.request.urlopen(req, timeout=20) as resp:
                  return json.load(resp)

          def clean_markdown(text):
              text = re.sub(r"`([^`]+)`", r"\1", text)
              text = re.sub(r"\[([^\]]+)\]\([^)]+\)", r"\1", text)
              text = re.sub(r"[*_~]", "", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def compact_line(text, limit=170):
              text = clean_markdown(text)
              text = re.sub(r"^[-*+]\s+", "", text)
              text = re.sub(r"^\d+[.)]\s+", "", text)
              text = text.strip(" -*\t")
              if len(text) > limit:
                  text = text[: limit - 1].rstrip() + "…"
              return text

          def split_body_sections(markdown):
              sections = []
              current_title = "summary"
              current_lines = []
              in_code = False
              for raw in markdown.splitlines():
                  line = raw.rstrip()
                  if line.strip().startswith("```"):
                      in_code = not in_code
                      continue
                  if in_code:
                      continue
                  heading = re.match(r"^#{1,6}\s+(.+?)\s*$", line)
                  if heading:
                      sections.append((current_title, current_lines))
                      current_title = heading.group(1).strip().lower()
                      current_lines = []
                  else:
                      current_lines.append(line)
              sections.append((current_title, current_lines))
              return sections

          def body_summary(markdown):
              for _title, lines in split_body_sections(markdown):
                  for raw in lines:
                      line = raw.strip()
                      if not line or line.startswith("#") or line.startswith(("-", "*", "+")):
                          continue
                      if re.match(r"^\d+[.)]\s+", line):
                          continue
                      if denied_line_words.search(line):
                          continue
                      return compact_line(line, 180)
              return ""

          def sentence_items(text):
              text = text.strip()
              if not text or text.startswith("#") or denied_line_words.search(text):
                  return []
              if text.startswith(("- ", "* ", "+ ")) or re.match(r"^\d+[.)]\s+", text):
                  item = compact_line(text)
                  return [item] if item else []

              text = clean_markdown(text)
              parts = re.split(r"(?<=[.!?])\s+(?=[A-Z0-9])", text)
              if len(parts) == 1 and ";" in text:
                  parts = re.split(r"\s*;\s*", text)
              if len(parts) == 1 and ", " in text and len(text) > 140:
                  parts = re.split(r",\s+(?=No |Adds |Fixes |Corrects |Prevents |Updates |Improves |Keeps )", text)
              out = []
              for part in parts:
                  item = compact_line(part)
                  if item and len(item) >= 8 and not denied_line_words.search(item):
                      out.append(item)
              return out

          def body_changelog(markdown, summary="", max_items=7):
              out = []
              seen = set()
              for title, lines in split_body_sections(markdown):
                  t = re.sub(r"[^a-z0-9 ]+", " ", title.lower()).strip()
                  if any(word in t for word in denied_section_words):
                      continue
                  allowed = t in allowed_sections or any(word in t.split() for word in allowed_sections)
                  if not allowed and title != "summary":
                      continue
                  for raw in lines:
                      for item in sentence_items(raw):
                          if summary and item.lower() == summary.lower():
                              continue
                          key = item.lower()
                          if key and key not in seen:
                              seen.add(key)
                              out.append(item)
                          if len(out) >= max_items:
                              return out
              return out

          def previous_public_release():
              try:
                  releases = gh_json(f"/repos/{repo}/releases?per_page=100")
              except Exception:
                  return None
              current_time = parse_time(published_at)
              candidates = []
              for rel in releases:
                  if str(rel.get("id", "")) == str(release_id):
                      continue
                  if rel.get("tag_name") == tag:
                      continue
                  if rel.get("draft") or rel.get("prerelease"):
                      continue
                  rel_time = parse_time(rel.get("published_at") or rel.get("created_at") or "")
                  if current_time and rel_time and rel_time >= current_time:
                      continue
                  candidates.append((rel_time or dt.datetime.min.replace(tzinfo=dt.timezone.utc), rel))
              if not candidates:
                  return None
              candidates.sort(key=lambda item: item[0], reverse=True)
              return candidates[0][1]

          def compare_changelog(prev_tag, max_items=7):
              if not prev_tag:
                  return []
              base = urllib.parse.quote(prev_tag, safe="")
              head = urllib.parse.quote(tag, safe="")
              try:
                  data = gh_json(f"/repos/{repo}/compare/{base}...{head}")
              except Exception:
                  return []
              out = []
              seen = set()
              for commit in data.get("commits", []):
                  message = commit.get("commit", {}).get("message", "").splitlines()[0]
                  item = compact_line(message)
                  lower = item.lower()
                  if not item:
                      continue
                  if lower.startswith(("merge pull request", "merge branch", "release ")):
                      continue
                  if "telegram release announcement" in lower or "telegram release announcements" in lower:
                      continue
                  if lower not in seen:
                      seen.add(lower)
                      out.append(item)
                  if len(out) >= max_items:
                      break
              return out

          prev = previous_public_release()
          prev_tag = prev.get("tag_name") if prev else ""
          summary = body_summary(body)
          changes = body_changelog(body, summary=summary)
          if not changes:
              changes = compare_changelog(prev_tag)
          if not changes:
              changes = ["Details im GitHub Release."]

          kind = "Pre-release" if prerelease else "Release"
          display_title = name if name and name != tag else f"{kind} {tag}"
          since = f"seit {prev_tag}" if prev_tag else "seit letztem Public Release"

          parts = [
              f"<b>{html.escape(repo)}</b>",
              f"<b>{html.escape(display_title)}</b>",
          ]
          if name and name != tag:
              parts.append(f"Release: {html.escape(tag)}")

          bullet_lines = "\n".join(f"• {html.escape(item)}" for item in changes[:7])
          parts.append(f"<b>Changelog {html.escape(since)}</b>\n{bullet_lines}")
          parts.append(f'<a href="{html.escape(url)}">GitHub Release öffnen</a>')

          message = "\n\n".join(parts)
          if len(message) > 3500:
              message = message[:3400].rstrip() + "\n\n…\n\n" + f'<a href="{html.escape(url)}">GitHub Release öffnen</a>'
          print(message)
          PY

          curl -fsS --retry 3 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text@/tmp/telegram-message.html"
