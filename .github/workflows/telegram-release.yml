name: Telegram release announcement

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to announce"
        required: true
      dry_run:
        description: "Do not send Telegram message"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Send Telegram release post
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_NAME: ${{ github.event.release.name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_BODY: ${{ github.event.release.body }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
          MANUAL_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python3 .github/scripts/telegram_release_announcement.py
